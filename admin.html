<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Participant Admin</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; background: #f3f7fb; color: #1c2d3f; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
  h1 { margin: 0 0 16px; }
  .grid { display: grid; grid-template-columns: 330px 1fr; gap: 16px; }
  .card { background: white; border: 1px solid #d6e4f2; border-radius: 12px; padding: 14px; }
  .users { max-height: 520px; overflow-y: auto; }
  .user-row { display: grid; grid-template-columns: 20px 1fr; gap: 8px; align-items: start; padding: 6px 0; border-bottom: 1px solid #edf3f9; }
  .user-row:last-child { border-bottom: 0; }
  .email { font-size: 13px; font-weight: 600; }
  .meta { font-size: 11px; color: #5b7691; margin-top: 2px; }
  .btn { border: 1px solid #2c77c8; background: #2c77c8; color: white; border-radius: 8px; font-size: 12px; padding: 7px 10px; cursor: pointer; }
  .btn.secondary { background: white; color: #2c77c8; }
  .btn.danger { background: #ba0517; border-color: #ba0517; color: #ffffff; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .toolbar.danger-zone { border-top: 1px solid #edf3f9; padding-top: 10px; margin-top: 2px; }
  .selection-status { font-size: 12px; color: #5b7691; margin: -2px 0 10px; min-height: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { border-bottom: 1px solid #edf3f9; padding: 7px 6px; text-align: left; }
  th { background: #f8fbff; }
  .count-pill { display: inline-block; min-width: 22px; text-align: center; border-radius: 999px; padding: 2px 6px; color: white; font-weight: 700; font-size: 11px; }
  .green { background: #2e844a; } .amber { background: #e45b00; } .red { background: #ba0517; } .na { background: #6b7280; } .unset { background: #c3d4e4; color: #1c2d3f; }
  .error { color: #ba0517; font-size: 12px; min-height: 18px; }
  .auth-overlay { position: fixed; inset: 0; background: rgba(8, 22, 40, 0.55); display: flex; align-items: center; justify-content: center; z-index: 20; }
  .auth-card { width: min(92vw, 380px); background: #ffffff; border: 1px solid #d6e4f2; border-radius: 12px; padding: 18px; box-shadow: 0 18px 40px rgba(15, 35, 60, 0.25); }
  .auth-title { margin: 0 0 8px; font-size: 18px; font-weight: 700; }
  .auth-sub { margin: 0 0 12px; font-size: 12px; color: #5b7691; }
  .auth-input { width: 100%; box-sizing: border-box; border: 1px solid #bdd3ea; border-radius: 8px; padding: 9px 10px; font-size: 13px; }
  .auth-actions { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
  .hidden { display: none !important; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <div class="auth-overlay" id="adminGate">
    <div class="auth-card">
      <h2 class="auth-title">Admin Access</h2>
      <p class="auth-sub">Enter the admin page password to continue.</p>
      <input class="auth-input" id="gatePassword" type="password" autocomplete="current-password" placeholder="Admin page password">
      <div class="error" id="gateError"></div>
      <div class="auth-actions">
        <button class="btn" id="gateSubmitBtn" type="button">Unlock</button>
      </div>
    </div>
  </div>
  <div class="wrap">
    <h1>Participant Admin</h1>
    <div class="grid">
      <div class="card">
        <div class="toolbar">
          <button class="btn" id="refreshBtn" type="button">Refresh Users</button>
          <button class="btn secondary" id="selectAllBtn" type="button">Select All</button>
          <button class="btn secondary" id="selectTestBtn" type="button">Select +test</button>
          <button class="btn secondary" id="select15mBtn" type="button">Select Last 15m</button>
          <button class="btn secondary" id="select30mBtn" type="button">Select Last 30m</button>
          <button class="btn secondary" id="select60mBtn" type="button">Select Last 60m</button>
          <button class="btn secondary" id="clearBtn" type="button">Clear</button>
        </div>
        <div class="selection-status" id="selectionStatus"></div>
        <div class="toolbar danger-zone">
          <button class="btn secondary" id="deleteTestBtn" type="button">Delete Selected +test Users</button>
          <button class="btn secondary" id="deleteAllTestBtn" type="button">Delete ALL +test Users</button>
          <button class="btn danger" id="deleteUsersBtn" type="button">Danger: Delete Selected Users</button>
        </div>
        <div class="users" id="usersList"></div>
      </div>
      <div class="card">
        <div class="toolbar">
          <button class="btn" id="aggregateBtn" type="button">Aggregate Selected</button>
          <button class="btn secondary" id="openBtn" type="button">Open First Selected</button>
        </div>
        <div class="error" id="errorMsg"></div>
        <table>
          <thead>
            <tr>
              <th>Conversation</th>
              <th>Aspect</th>
              <th>High</th>
              <th>Medium</th>
              <th>Low</th>
              <th>N/A</th>
              <th>Unset</th>
            </tr>
          </thead>
          <tbody id="aggregateRows"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
const usersList = document.getElementById('usersList');
const aggregateRows = document.getElementById('aggregateRows');
const errorMsg = document.getElementById('errorMsg');
const selectionStatus = document.getElementById('selectionStatus');
const adminGate = document.getElementById('adminGate');
const gatePassword = document.getElementById('gatePassword');
const gateError = document.getElementById('gateError');
let users = [];
const aspectTitleMap = {};
let isUnlocked = false;

function setError(message) { errorMsg.textContent = message || ''; }
function setGateError(message) { gateError.textContent = message || ''; }
function selectedEmails() {
  return Array.from(document.querySelectorAll('input[data-email]:checked')).map(el => el.dataset.email);
}
function setSelectionStatus(message) {
  selectionStatus.textContent = message || '';
}
function isTestEmail(email) {
  return String(email || '').toLowerCase().includes('+test');
}
function summaryList(emails) {
  const list = emails.slice(0, 12);
  const remainder = emails.length - list.length;
  return `${list.join('\n')}${remainder > 0 ? `\n...and ${remainder} more` : ''}`;
}

async function loadAspectTitles() {
  try {
    const res = await fetch('/my-conversations.html');
    const html = await res.text();
    const start = html.indexOf('const BOXES = {');
    const end = html.indexOf('const ORDER =');
    if (start === -1 || end === -1 || end <= start) return;

    const objectBlock = html.slice(start + 'const BOXES = '.length, end).trim().replace(/;\s*$/, '');
    const boxes = new Function(`return (${objectBlock});`)();
    Object.keys(boxes || {}).forEach((boxKey) => {
      const aspects = (boxes[boxKey]?.aspects || []).map((a) => a.title || '').filter(Boolean);
      aspectTitleMap[boxKey] = aspects;
    });
  } catch (_err) {
    // Graceful fallback: we'll still show numeric aspect index if parsing fails.
  }
}

function getAspectTitle(boxKey, aspectIndex) {
  const idx = Number(aspectIndex);
  const titles = aspectTitleMap[boxKey] || [];
  return titles[idx] || `Aspect ${idx + 1}`;
}

async function loadUsers() {
  if (!isUnlocked) return;
  setError('');
  const res = await fetch('/api/admin/users');
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Failed to load users');
  users = data.users || [];
  usersList.innerHTML = users.map((u) => `
    <label class="user-row">
      <input type="checkbox" data-email="${u.email}">
      <span>
        <div class="email">${u.email}</div>
        <div class="meta">responses: ${u.response_count || 0}${u.last_response_at ? ` · last: ${new Date(u.last_response_at).toLocaleString()}` : ''}</div>
      </span>
    </label>
  `).join('') || '<div class="meta">No users found yet.</div>';
  setSelectionStatus('');
}

async function unlockAdmin() {
  setGateError('');
  const password = (gatePassword.value || '').trim();
  if (!password) {
    setGateError('Enter admin page password.');
    return;
  }
  const res = await fetch('/api/admin/unlock', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Unable to unlock admin.');
  isUnlocked = true;
  adminGate.classList.add('hidden');
  await loadUsers();
}

function renderAggregate(rows) {
  aggregateRows.innerHTML = rows.map((row) => `
    <tr>
      <td>${row.box_key}</td>
      <td>${getAspectTitle(row.box_key, row.aspect_index)}</td>
      <td><span class="count-pill green">${row.green || 0}</span></td>
      <td><span class="count-pill amber">${row.amber || 0}</span></td>
      <td><span class="count-pill red">${row.red || 0}</span></td>
      <td><span class="count-pill na">${row.na || 0}</span></td>
      <td><span class="count-pill unset">${row.unset || 0}</span></td>
    </tr>
  `).join('');
}

function collapseRows(rawRows) {
  const map = new Map();
  rawRows.forEach((r) => {
    const key = `${r.box_key}:${r.aspect_index}`;
    if (!map.has(key)) {
      map.set(key, { box_key: r.box_key, aspect_index: Number(r.aspect_index), red: 0, amber: 0, green: 0, na: 0, unset: 0 });
    }
    const target = map.get(key);
    const level = (r.confidence_level || 'unset');
    target[level] = (target[level] || 0) + Number(r.count || 0);
  });
  return Array.from(map.values()).sort((a, b) => a.box_key.localeCompare(b.box_key) || a.aspect_index - b.aspect_index);
}

async function aggregateSelected() {
  if (!isUnlocked) return setError('Unlock admin first.');
  const emails = selectedEmails();
  if (!emails.length) return setError('Select at least one user first.');
  setError('');
  const res = await fetch('/api/admin/aggregate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ emails }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Failed to aggregate');
  renderAggregate(collapseRows(data.rows || []));
  const encoded = emails.map((e) => encodeURIComponent(e)).join(',');
  window.open(`/my-conversations-aggregate.html?emails=${encoded}`, '_blank');
}

async function deleteSelectedTestUsers() {
  if (!isUnlocked) return setError('Unlock admin first.');
  const emails = selectedEmails();
  if (!emails.length) return setError('Select at least one user first.');
  const nonTestEmails = emails.filter((email) => !isTestEmail(email));
  if (nonTestEmails.length) {
    return setError('Only +test users can be deleted with this action.');
  }
  const ok = window.confirm(
    `Delete ${emails.length} selected +test user(s)? This cannot be undone.\n\n${summaryList(emails)}`
  );
  if (!ok) {
    return;
  }

  setError('');
  const res = await fetch('/api/admin/delete-test-users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ emails }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Failed to delete users.');
  aggregateRows.innerHTML = '';
  await loadUsers();
  setError(`Deleted ${data.deletedCount || 0} +test user(s).`);
}

async function deleteAllTestUsers() {
  if (!isUnlocked) return setError('Unlock admin first.');
  const testEmails = users.map((u) => u.email).filter(isTestEmail);
  if (!testEmails.length) return setError('No +test users found.');
  const ok = window.confirm(
    `Delete ALL ${testEmails.length} +test user(s)? This cannot be undone.\n\n${summaryList(testEmails)}`
  );
  if (!ok) return;

  setError('');
  const res = await fetch('/api/admin/delete-all-test-users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Failed to delete all +test users.');
  aggregateRows.innerHTML = '';
  await loadUsers();
  setError(`Deleted ${data.deletedCount || 0} +test user(s).`);
}

async function deleteSelectedUsers() {
  if (!isUnlocked) return setError('Unlock admin first.');
  const emails = selectedEmails();
  if (!emails.length) return setError('Select at least one user first.');
  const confirmMessage =
    `DANGER: Delete ${emails.length} selected user(s)?\n\n` +
    `This permanently deletes the users and all their responses.\n\n` +
    `${summaryList(emails)}\n\n` +
    `Type DELETE to continue.`;
  const typed = window.prompt(confirmMessage, '');
  if (typed !== 'DELETE') return;

  setError('');
  const res = await fetch('/api/admin/delete-users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ emails }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Failed to delete users.');
  aggregateRows.innerHTML = '';
  await loadUsers();
  setError(`Deleted ${data.deletedCount || 0} user(s) and all associated responses.`);
}

function selectByRecentMinutes(minutes) {
  const now = Date.now();
  let selectedCount = 0;
  document.querySelectorAll('input[data-email]').forEach((el) => {
    const user = users.find((u) => u.email === el.dataset.email);
    const ts = user?.last_response_at ? Date.parse(user.last_response_at) : NaN;
    const withinWindow = Number.isFinite(ts) && (now - ts) <= (minutes * 60 * 1000);
    el.checked = withinWindow;
    if (withinWindow) selectedCount += 1;
  });
  setSelectionStatus(`Selected ${selectedCount} users from last ${minutes}m.`);
}

document.getElementById('refreshBtn').addEventListener('click', () => loadUsers().catch(e => setError(e.message)));
document.getElementById('selectAllBtn').addEventListener('click', () => {
  document.querySelectorAll('input[data-email]').forEach((el) => { el.checked = true; });
  setSelectionStatus(`Selected ${selectedEmails().length} users (all).`);
});
document.getElementById('selectTestBtn').addEventListener('click', () => {
  document.querySelectorAll('input[data-email]').forEach((el) => {
    el.checked = isTestEmail(el.dataset.email);
  });
  setSelectionStatus(`Selected ${selectedEmails().length} users with +test.`);
});
document.getElementById('select15mBtn').addEventListener('click', () => selectByRecentMinutes(15));
document.getElementById('select30mBtn').addEventListener('click', () => selectByRecentMinutes(30));
document.getElementById('select60mBtn').addEventListener('click', () => selectByRecentMinutes(60));
document.getElementById('clearBtn').addEventListener('click', () => {
  document.querySelectorAll('input[data-email]').forEach((el) => { el.checked = false; });
  setSelectionStatus('Selection cleared.');
});
document.getElementById('aggregateBtn').addEventListener('click', () => aggregateSelected().catch(e => setError(e.message)));
document.getElementById('openBtn').addEventListener('click', () => {
  if (!isUnlocked) return setError('Unlock admin first.');
  const emails = selectedEmails();
  if (!emails.length) return setError('Select one user to open their page.');
  window.open(`/my-conversations.html?email=${encodeURIComponent(emails[0])}`, '_blank');
});
document.getElementById('deleteTestBtn').addEventListener('click', () => deleteSelectedTestUsers().catch(e => setError(e.message)));
document.getElementById('deleteAllTestBtn').addEventListener('click', () => deleteAllTestUsers().catch(e => setError(e.message)));
document.getElementById('deleteUsersBtn').addEventListener('click', () => deleteSelectedUsers().catch(e => setError(e.message)));
document.getElementById('gateSubmitBtn').addEventListener('click', () => unlockAdmin().catch(e => setGateError(e.message)));
gatePassword.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') unlockAdmin().catch(e => setGateError(e.message));
});

Promise.all([loadAspectTitles()])
  .catch((e) => setError(e.message));
</script>
</body>
</html>
